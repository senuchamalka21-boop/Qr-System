<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel QR - Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="fas fa-gas-pump me-2"></i>Fuel QR System
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 animate-fade">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2 class="fw-bold"><i class="fas fa-chart-pie me-2 text-primary"></i>Analytics & Insights</h2>
                <p class="text-muted">Real-time statistics of the Fuel QR Registration Network.</p>
            </div>
        </div>

        
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="glass-card p-4 text-center border-primary border-top border-4">
                    <h6 class="text-muted text-uppercase small fw-bold">Total Vehicles</h6>
                    <h2 class="display-6 fw-bold" id="totalVehicles">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glass-card p-4 text-center border-success border-top border-4">
                    <h6 class="text-muted text-uppercase small fw-bold">Petrol Quotas</h6>
                    <h2 class="display-6 fw-bold text-success" id="totalPetrol">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glass-card p-4 text-center border-warning border-top border-4">
                    <h6 class="text-muted text-uppercase small fw-bold">Diesel Quotas</h6>
                    <h2 class="display-6 fw-bold text-warning" id="totalDiesel">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glass-card p-4 text-center border-info border-top border-4">
                    <h6 class="text-muted text-uppercase small fw-bold">Active Stations</h6>
                    <h2 class="display-6 fw-bold text-info" id="totalStations">0</h2>
                </div>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="glass-card p-4 h-100">
                    <h5 class="fw-bold mb-4">Fuel Type Distribution</h5>
                    <canvas id="fuelTypeChart"></canvas>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="glass-card p-4 h-100">
                    <h5 class="fw-bold mb-4">Vehicles per Fuel Station</h5>
                    <canvas id="stationChart"></canvas>
                </div>
            </div>
            
            <div class="col-md-12">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4">Registration Trend</h5>
                    <canvas id="trendChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
